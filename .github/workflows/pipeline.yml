name: ML Pipeline CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ML pipeline
        run: python run_pipeline.py

      - name: Test API starts correctly
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "fixed_acidity": 7.4, "volatile_acidity": 0.70,
              "citric_acid": 0.0, "residual_sugar": 1.9,
              "chlorides": 0.076, "free_sulfur_dioxide": 11.0,
              "total_sulfur_dioxide": 34.0, "density": 0.9978,
              "ph": 3.51, "sulphates": 0.56, "alcohol": 9.4
            }'
